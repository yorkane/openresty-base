worker_processes 1;
error_log /repo/test/logs/error.log warn;
pid       /repo/test/logs/nginx.pid;

events { worker_connections 64; }

http {
    lua_package_path  "/usr/local/openresty/lualib/?.lua;;";
    lua_package_cpath "/usr/local/openresty/lualib/?.so;;";

    server {
        listen 8080;
        server_name localhost;

        # ── 1. Lua 基础 ───────────────────────────────────────────────
        location /hello {
            default_type text/plain;
            content_by_lua_block {
                ngx.say("hello from lua")
                ngx.say("ngx_lua_version=" .. ngx.config.ngx_lua_version)
                ngx.say("openresty_version=" .. ngx.config.nginx_version)
            }
        }

        # ── 2. cjson（内置库）────────────────────────────────────────
        location /json {
            default_type application/json;
            content_by_lua_block {
                local cjson = require "cjson"
                ngx.say(cjson.encode({
                    status  = "ok",
                    module  = "cjson",
                    ts      = ngx.time(),
                }))
            }
        }

        # ── 3. resty.core / ngx.re / resty.lrucache ──────────────────
        location /core {
            default_type text/plain;
            content_by_lua_block {
                local libs = {
                    "resty.core",
                    "ngx.re",
                    "resty.lrucache",
                    "resty.string",
                    "resty.md5",
                }
                for _, name in ipairs(libs) do
                    local ok, err = pcall(require, name)
                    ngx.say(name .. ": " .. (ok and "OK" or ("FAIL - " .. tostring(err))))
                end
            }
        }

        # ── 4. LuaJIT FFI smoke test ──────────────────────────────────
        location /ffi {
            default_type text/plain;
            content_by_lua_block {
                local ffi = require "ffi"
                ffi.cdef[[ int printf(const char *fmt, ...); ]]
                ngx.say("ffi: OK")
                ngx.say("arch: " .. ffi.arch)
                ngx.say("os: "   .. ffi.os)
            }
        }

        # ── 5. FancyIndex 目录浏览 ────────────────────────────────────
        location /files/ {
            alias          /repo/test/html/;
            fancyindex     on;
            fancyindex_exact_size off;
            fancyindex_time_format "%Y-%m-%d %H:%M";
        }

        # ── 6. WebDAV (dav + dav-ext-module) ─────────────────────────
        location /dav/ {
            alias   /repo/test/dav/;
            dav_methods        PUT DELETE MKCOL COPY MOVE;
            dav_ext_methods    PROPFIND OPTIONS LOCK UNLOCK;
            dav_access         user:rw group:rw all:r;
            create_full_put_path on;
            autoindex          on;
        }
    }
}
